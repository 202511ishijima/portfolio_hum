<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マイページ | はむのくらし</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/pages.css">
</head>
<body data-base-path="../" data-page="mypage" data-member-guard="active">
  <div id="site-header"></div>
  <main class="container page-shell">
    <section class="page-hero">
      <p class="eyebrow">MY PAGE</p>
      <h1>マイページ</h1>
      <p>現在のポイントや景品交換の目安をまとめて確認できるダミー会員ページです。</p>
    </section>

    <section class="split-visual">
      <div class="visual-card section-stack">
        <h2>会員ステータス</h2>
        <p>ログイン後の会員名や現在ポイントを確認しながら、次に交換したい景品を選べます。</p>
        <figure class="media-photo">
          <img src="../image/会員イメージ画像.png" alt="会員ステータスイメージ">
        </figure>
      </div>
      <div class="quote-card">
        <p>限定ぬいぐるみは、会員制度のいちばん人気の景品です。あとどれくらいで届くかを楽しみながら貯められます。</p>
      </div>
    </section>

    <div id="member-summary"></div>
    <details class="contact-chat-accordion section-stack">
      <summary>お問い合わせチャット</summary>
      <p class="contact-chat-accordion__lead">送信した内容と運営からの返信を、時系列で確認できます。</p>
      <section class="section-stack" id="member-inquiry-replies"></section>
    </details>

    <section class="cta-band">
      <a class="button" href="./rewards.html">景品一覧を見る</a>
    </section>

    <section class="cta-band">
      <button class="button button--ghost" type="button" id="logout-button">ログアウト</button>
    </section>
  </main>
  <div id="site-footer"></div>
  <script src="../assets/js/common.js"></script>
  <script src="../assets/js/router.js"></script>
  <script src="../assets/js/membership.js"></script>
</body>
</html>
