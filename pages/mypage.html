<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マイページ | はむのくらし</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/pages.css">
</head>
<body data-base-path="../" data-page="mypage">
  <div id="site-header"></div>
  <main class="container">
    <section class="page-hero page-shell">
      <p class="eyebrow">MY PAGE</p>
      <h1>マイページ</h1>
      <p>現在のポイントや景品交換の目安をまとめて確認できるダミーページです。限定ぬいぐるみまでの距離が見える構成にしています。</p>
    </section>

    <section class="section section-stack">
      <div class="split-visual">
        <div class="panel visual-card">
          <h2>会員ステータス</h2>
          <p>来店やお買い物でためたポイントを確認し、次に目指す景品を選べます。提出用の画面として、視認性重視のレイアウトにしています。</p>
          <div class="media-placeholder">会員証・グッズイメージ</div>
        </div>
        <div class="quote-card">
          <p>限定ぬいぐるみは、会員制度のいちばん大きな楽しみとして配置しています。</p>
        </div>
      </div>

      <div id="member-summary"></div>

      <div class="cta-band">
        <div>
          <h2>次の景品をチェック</h2>
          <p>景品一覧ページでは、必要ポイントごとに交換できる内容をまとめて確認できます。</p>
        </div>
        <a class="button" href="./rewards.html">景品一覧を見る</a>
      </div>
    </section>
  </main>
  <div id="site-footer"></div>
  <script src="../assets/js/common.js"></script>
  <script src="../assets/js/router.js"></script>
  <script src="../assets/js/membership.js"></script>
