<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ | はむのくらし</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/pages.css">
</head>
<body data-base-path="../" data-page="home">
  <div id="site-header"></div>
  <main class="container">
    <section class="page-hero">
      <div class="breadcrumb"><a href="../index.html">TOP</a><span>></span><span>お問い合わせ</span></div>
      <p class="eyebrow">CONTACT</p>
      <h1>お問い合わせ</h1>
      <p>お迎え相談、カフェ利用、景品交換についてお気軽にご連絡ください。</p>
    </section>
    <section class="section cart-layout">
      <article class="form-card">
        <h2>フォーム</h2>
        <form class="form-grid">
          <label class="form-row">お名前<input type="text" placeholder="はむの くらし"></label>
          <label class="form-row">メールアドレス<input type="email" placeholder="hamu@example.com"></label>
          <label class="form-row">お問い合わせ種別
            <select>
              <option>カフェについて</option>
              <option>お迎えについて</option>
              <option>商品について</option>
              <option>会員制度について</option>
            </select>
          </label>
          <label class="form-row">内容<textarea placeholder="お問い合わせ内容を入力してください"></textarea></label>
          <button class="button" type="button">送信する</button>
        </form>
      </article>
      <article class="summary-card">
        <h2>ご案内</h2>
        <ul class="check-list">
          <li>返信目安: 2営業日以内</li>
          <li>お迎え希望は対面説明が前提です</li>
          <li>SNS投稿・取材の相談も受付中です</li>
        </ul>
      </article>
    </section>
  </main>
  <div id="site-footer"></div>
  <script src="../assets/js/common.js"></script>
</body>
</html>
