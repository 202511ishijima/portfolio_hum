<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン | はむのくらし</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/pages.css">
</head>
<body data-base-path="../" data-page="login">
  <div id="site-header"></div>
  <main class="container">
    <section class="section auth-layout">
      <article class="section-stack">
        <div class="panel visual-card">
          <p class="eyebrow">LOGIN</p>
          <h1>ログイン</h1>
          <p>ポイント確認や景品交換ページの利用に進むためのダミーログイン画面です。提出用の静的サイトとして、会員導線を分かりやすく整理しています。</p>
          <figure class="media-photo">
            <img src="../image/会員イメージ画像.png" alt="会員イメージ">
          </figure>
        </div>
        <div class="panel">
          <h2>ログイン後にできること</h2>
          <ul class="check-list">
            <li>現在ポイントの確認</li>
            <li>限定ぬいぐるみの交換導線確認</li>
            <li>会員特典ページと景品一覧の閲覧</li>
          </ul>
        </div>
      </article>

      <article class="form-card">
        <h2>会員情報を入力</h2>
        <form id="login-form" class="form-grid">
          <label class="form-row">メールアドレス<input name="email" type="email" required></label>
          <label class="form-row">パスワード<input name="password" type="password" required></label>
          <button class="button" type="submit">ログインする</button>
        </form>
        <div class="link-row">
          <a class="button button-secondary" href="./register.html">新規会員登録</a>
          <a class="button button-ghost" href="./membership.html">制度を見る</a>
        </div>
      </article>
    </section>
  </main>
  <div id="site-footer"></div>
  <script src="../assets/js/common.js"></script>
  <script src="../assets/js/router.js"></script>
  <script src="../assets/js/membership.js"></script>
</body>
</html>
