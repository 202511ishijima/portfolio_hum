      <details class="faq-item" open>
        <summary>子どもでもお迎えできますか？</summary>
        <p>年齢制限はありませんが、親御さまと一緒に飼育環境やお世話の体制を確認したうえでご案内します。</p>
      </details>
      <details class="faq-item">
        <summary>返品はできますか？</summary>
        <p>自己都合による返品はできません。飼えない事情がある場合は引き取り対応をご相談ください。</p>
      </details>
      <details class="faq-item">
        <summary>ポイントは買い物に使えますか？</summary>
        <p>ポイントは値引きには使えず、限定グッズとの交換のみです。</p>
      </details>
