<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>会員登録 | はむのくらし</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/pages.css">
</head>
<body data-base-path="../" data-page="register">
  <div id="site-header"></div>
  <main class="container">
    <section class="section auth-layout">
      <article class="section-stack">
        <div class="panel visual-card">
          <p class="eyebrow">REGISTER</p>
          <h1>会員登録</h1>
          <p>100円ごとに1ポイントがたまり、限定グッズ交換につながる会員制度の入口です。特に500ポイントで交換できるぬいぐるみを主役に見せています。</p>
          <figure class="media-photo">
            <img src="../image/ぬいぐるみ訴求画像.png" alt="ぬいぐるみ訴求イメージ">
          </figure>
        </div>
        <div class="grid-three">
          <article class="info-card">
            <h3>50pt</h3>
            <p>小さな遊び道具と交換</p>
          </article>
          <article class="info-card">
            <h3>100pt</h3>
            <p>限定キーホルダーと交換</p>
          </article>
          <article class="info-card">
            <h3>500pt</h3>
            <p>限定ぬいぐるみと交換</p>
          </article>
        </div>
      </article>

      <article class="form-card">
        <h2>会員情報を登録</h2>
        <form id="register-form" class="form-grid">
          <label class="form-row">お名前<input name="name" type="text" required></label>
          <label class="form-row">メールアドレス<input name="email" type="email" required></label>
          <label class="form-row">パスワード<input name="password" type="password" required></label>
          <button class="button" type="submit">登録する</button>
        </form>
        <div class="link-row">
          <a class="button button-secondary" href="./login.html">ログインへ</a>
          <a class="button button-ghost" href="./rewards.html">景品一覧を見る</a>
        </div>
      </article>
    </section>
  </main>
  <div id="site-footer"></div>
  <script src="../assets/js/common.js"></script>
  <script src="../assets/js/router.js"></script>
  <script src="../assets/js/membership.js"></script>
</body>
</html>
