<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>景品交換 | はむのくらし</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/pages.css">
</head>
<body data-base-path="../" data-page="membership">
  <div id="site-header"></div>
  <main class="container">
    <section class="page-hero page-shell">
      <p class="eyebrow">REWARDS</p>
      <h1>景品交換</h1>
      <p>ポイントはお買い物値引きではなく、限定グッズとの交換専用です。特にぬいぐるみを目立たせ、会員制度の魅力が伝わる見せ方にしています。</p>
    </section>

    <section class="section section-stack">
      <div class="split-visual">
        <div class="panel visual-card">
          <h2>主役は限定ぬいぐるみ</h2>
          <p>500ポイントで交換できる限定ぬいぐるみを、会員制度の象徴として訴求します。キーホルダーや小さな遊び道具は、その手前の楽しみとして配置します。</p>
          <figure class="media-photo">
            <img src="../image/ぬいぐるみ訴求画像.png" alt="限定ぬいぐるみのイメージ">
          </figure>
        </div>
        <div class="panel">
          <h2>交換ルール</h2>
          <ul class="check-list">
            <li>100円ごとに1ポイント</li>
            <li>50ポイントで小さな遊び道具</li>
            <li>100ポイントでキーホルダー</li>
            <li>500ポイントで限定ぬいぐるみ</li>
          </ul>
        </div>
      </div>

      <div id="rewards-list" class="card-grid"></div>
    </section>
  </main>
  <div id="site-footer"></div>
  <script src="../assets/js/common.js"></script>
  <script src="../assets/js/router.js"></script>
  <script src="../assets/js/membership.js"></script>
</body>
</html>
