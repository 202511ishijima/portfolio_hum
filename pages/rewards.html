<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>景品交換 | はむのくらし</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/pages.css">
</head>
<body data-base-path="../" data-page="membership">
  <div id="site-header"></div>
  <main class="container page-shell">
    <section class="page-hero">
      <p class="eyebrow">REWARDS</p>
      <h1>景品交換</h1>
      <p>ためたポイントで交換できる限定グッズを紹介しています。主役は500ポイントで交換できる限定ぬいぐるみです。</p>
    </section>

    <section class="split-visual">
      <div class="visual-card section-stack">
        <h2>いちばん人気は限定ぬいぐるみ</h2>
        <p>会員制度の中心となる特典として、限定ぬいぐるみを大きく訴求しています。キーホルダーや小さな遊び道具も気軽に交換できます。</p>
        <figure class="media-photo">
          <img src="../image/ぬいぐるみ訴求画像.png" alt="限定ぬいぐるみイメージ">
        </figure>
      </div>
      <div class="summary-card">
        <h2>交換ルール</h2>
        <ul class="check-list">
          <li>100円ごとに1ポイント</li>
          <li>50ポイントで小さな遊び道具</li>
          <li>100ポイントでキーホルダー</li>
          <li>500ポイントで限定ぬいぐるみ</li>
        </ul>
      </div>
    </section>

    <section>
      <div id="rewards-list" class="card-grid"></div>
    </section>
  </main>
  <div id="site-footer"></div>
  <script src="../assets/js/common.js"></script>
  <script src="../assets/js/router.js"></script>
  <script src="../assets/js/membership.js"></script>
</body>
</html>
