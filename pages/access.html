<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>アクセス | はむのくらし</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/pages.css">
</head>
<body data-base-path="../" data-page="access">
  <div id="site-header"></div>
  <main class="container page-shell">
    <section class="page-hero">
      <div class="breadcrumb"><a href="../index.html">TOP</a><span>></span><span>アクセス</span></div>
      <p class="eyebrow">ACCESS</p>
      <h1>アクセス</h1>
      <p>はむのくらしは、千葉県柏市の駅近エリアにある設定です。JR柏駅から徒歩5分を想定しています。</p>
    </section>

    <section class="split-visual">
      <article class="visual-card section-stack">
        <h2>店舗情報</h2>
        <ul class="check-list">
          <li>所在地: 千葉県柏市 駅徒歩5分エリア</li>
          <li>最寄り駅: 柏駅</li>
          <li>営業時間: 10:00〜21:00</li>
          <li>定休日: なし</li>
        </ul>
        <div class="button-row">
          <a class="button" href="contact.html">お問い合わせへ</a>
          <a class="button button--ghost" href="cafe.html">カフェを見る</a>
        </div>
      </article>
      <article class="summary-card section-stack">
        <h2>道順の目安</h2>
        <p>柏駅から商業エリアをまっすぐ進み、飲食店が並ぶ通りを抜けた先にあるイメージです。駅近で立ち寄りやすい立地を想定しています。</p>
        <p class="text-soft">このページの地図表示は架空設定に合わせて柏駅を表示しています。</p>
      </article>
    </section>

    <section class="section-stack">
      <div class="section-heading">
        <p class="eyebrow">MAP</p>
        <h2>マップ</h2>
      </div>
      <div class="visual-card">
        <iframe
          title="柏駅周辺マップ"
          src="https://www.google.com/maps?q=%E6%9F%8F%E9%A7%85&output=embed"
          style="width: 100%; min-height: 360px; border: 0; border-radius: 22px;"
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"></iframe>
      </div>
    </section>
  </main>
  <div id="site-footer"></div>
  <script src="../assets/js/common.js"></script>
</body>
</html>
