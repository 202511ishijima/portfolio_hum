spring:
  application:
    name: portfolio-backend
  thymeleaf:
    cache: false
  jackson:
    time-zone: Asia/Tokyo
  datasource:
    url: ${DB_URL:jdbc:h2:file:./data/portfolio_backend;MODE=MySQL;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.ishijima.portfoliobackend.entity
  type-handlers-package: com.ishijima.portfoliobackend.typehandler
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 8080

logging:
  level:
    com.ishijima.portfoliobackend: debug

app:
  frontend-base-url: ${FRONTEND_BASE_URL:https://202511ishijima.github.io/portfolio_hum}
  backend-base-url: ${BACKEND_BASE_URL:https://portfolio-hum.onrender.com}
