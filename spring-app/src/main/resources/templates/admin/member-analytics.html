<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>会員数推移 | はむのくらし</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/admin.css}">
</head>
<body class="admin-body">
	<div class="admin-shell">
		<header class="admin-header">
			<div>
				<p class="admin-eyebrow">HAMU NO KURASHI</p>
				<h1>会員数推移</h1>
				<p class="admin-lead">登録会員数の推移を、日別・月別・年別で切り替えて確認できます。</p>
			</div>
			<div class="admin-header-actions">
				<a class="admin-link-button admin-button--ghost" th:href="@{/admin/members}">一覧へ戻る</a>
			</div>
		</header>

		<nav class="admin-nav" aria-label="管理メニュー">
			<a class="admin-nav-link"
			   th:classappend="${adminSection == 'dashboard'} ? ' is-active' : ''"
			   th:href="@{/admin/dashboard}">ダッシュボード</a>
			<a class="admin-nav-link"
			   th:classappend="${adminSection == 'inquiries'} ? ' is-active' : ''"
			   th:href="@{/admin/inquiries}">お問い合わせ一覧</a>
			<a class="admin-nav-link"
			   th:classappend="${adminSection == 'members'} ? ' is-active' : ''"
			   th:href="@{/admin/members}">会員管理</a>
			<a class="admin-nav-link"
			   th:classappend="${adminSection == 'employees'} ? ' is-active' : ''"
			   th:href="@{/admin/employees}">従業員管理</a>
			<a class="admin-nav-link"
			   th:classappend="${adminSection == 'shifts'} ? ' is-active' : ''"
			   th:href="@{/admin/shifts}">シフト管理</a>
			<a class="admin-nav-link"
			   th:classappend="${adminSection == 'hamsters'} ? ' is-active' : ''"
			   th:href="@{/admin/hamsters}">ハムスター管理</a>
		</nav>

		<section class="admin-summary-grid admin-summary-grid--compact">
			<article class="admin-summary-card">
				<h2>会員総数</h2>
				<p class="admin-summary-number" th:text="${memberCount}">0</p>
			</article>
			<article class="admin-summary-card">
				<h2>利用中</h2>
				<p class="admin-summary-number" th:text="${activeCount}">0</p>
			</article>
			<article class="admin-summary-card">
				<h2>停止中</h2>
				<p class="admin-summary-number" th:text="${suspendedCount}">0</p>
			</article>
		</section>

		<section class="admin-card">
			<div class="admin-card-header">
				<div>
					<h2>会員数グラフ</h2>
					<p>見たい単位を切り替えて、登録会員数の増え方を確認できます。</p>
				</div>
			</div>
			<div class="admin-toggle-row" aria-label="会員数推移の表示切り替え">
				<button class="admin-chip-button is-active" type="button" data-member-unit="day">日別</button>
				<button class="admin-chip-button" type="button" data-member-unit="month">月別</button>
				<button class="admin-chip-button" type="button" data-member-unit="year">年別</button>
			</div>
			<div class="admin-chart-wrap">
				<canvas id="memberAnalyticsChart"></canvas>
			</div>
		</section>

		<section class="admin-card">
			<div class="admin-card-header">
				<div>
					<h2>件数表</h2>
					<p>現在表示している単位の件数を表でも確認できます。</p>
				</div>
			</div>

			<div class="admin-table-wrap">
				<table class="admin-table">
					<thead>
						<tr>
							<th id="memberAnalyticsTableLabel">日付</th>
							<th>会員数</th>
						</tr>
					</thead>
					<tbody id="memberAnalyticsTableBody">
						<tr th:each="point : ${dailyPoints}">
							<td th:text="${point.label}">03/26</td>
							<td th:text="${point.count}">0</td>
						</tr>
					</tbody>
				</table>
			</div>
		</section>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
	<script th:inline="javascript">
		const memberAnalyticsData = {
			day: {
				label: '日別会員数',
				tableLabel: '日付',
				labels: /*[[${dailyLabels}]]*/ [],
				counts: /*[[${dailyCounts}]]*/ []
			},
			month: {
				label: '月別会員数',
				tableLabel: '月',
				labels: /*[[${monthlyLabels}]]*/ [],
				counts: /*[[${monthlyCounts}]]*/ []
			},
			year: {
				label: '年別会員数',
				tableLabel: '年',
				labels: /*[[${yearlyLabels}]]*/ [],
				counts: /*[[${yearlyCounts}]]*/ []
			}
		};

		const memberChart = new Chart(document.getElementById('memberAnalyticsChart'), {
			type: 'line',
			data: {
				labels: memberAnalyticsData.day.labels,
				datasets: [{
					label: memberAnalyticsData.day.label,
					data: memberAnalyticsData.day.counts,
					borderColor: '#b98b66',
					backgroundColor: 'rgba(185, 139, 102, 0.18)',
					fill: true,
					tension: 0.25
				}]
			},
			options: {
				responsive: true,
				maintainAspectRatio: false,
				scales: {
					y: {
						beginAtZero: true,
						ticks: { precision: 0 }
					}
				}
			}
		});

		const tableLabel = document.getElementById('memberAnalyticsTableLabel');
		const tableBody = document.getElementById('memberAnalyticsTableBody');

		function renderTable(unit) {
			const dataset = memberAnalyticsData[unit];
			tableLabel.textContent = dataset.tableLabel;
			tableBody.innerHTML = '';
			dataset.labels.forEach((label, index) => {
				const row = document.createElement('tr');
				row.innerHTML = `<td>${label}</td><td>${dataset.counts[index]}</td>`;
				tableBody.appendChild(row);
			});
		}

		document.querySelectorAll('[data-member-unit]').forEach((button) => {
			button.addEventListener('click', () => {
				const unit = button.dataset.memberUnit;
				const dataset = memberAnalyticsData[unit];
				memberChart.data.labels = dataset.labels;
				memberChart.data.datasets[0].label = dataset.label;
				memberChart.data.datasets[0].data = dataset.counts;
				memberChart.update();
				renderTable(unit);

				document.querySelectorAll('[data-member-unit]').forEach((item) => {
					item.classList.toggle('is-active', item === button);
				});
			});
		});
	</script>
</body>
</html>
