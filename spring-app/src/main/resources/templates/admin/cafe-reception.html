<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>カフェ受付発行 | はむのくらし</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/admin.css}">
</head>
<body class="admin-body">
	<div class="admin-shell">
		<header class="admin-header">
			<div>
				<p class="admin-eyebrow">HAMU NO KURASHI</p>
				<h1>カフェ受付発行</h1>
				<p class="admin-lead">人数を入力して、座席ごとの注文QRセッションを発行します（有効90分）。</p>
			</div>
			<div class="admin-header-actions">
				<a class="admin-link-button admin-button--ghost" th:href="@{/admin/cafe/orders}">注文一覧へ</a>
				<a class="admin-link-button admin-button--ghost" th:href="@{/admin/cafe/menu}">メニュー価格設定</a>
			</div>
		</header>

		<div th:replace="~{admin/fragments :: adminNav(${adminSection})}"></div>

		<p class="admin-alert admin-alert--success" th:if="${cafeMessage}" th:text="${cafeMessage}">発行しました。</p>
		<p class="admin-alert admin-alert--error" th:if="${cafeError}" th:text="${cafeError}">処理に失敗しました。</p>

		<section class="admin-card">
			<div class="admin-card-header">
				<div>
					<h2>座席表</h2>
					<p>1人席12席、2人席8席、4人テーブル8席（ACTIVEセッションを利用中として表示）。</p>
				</div>
			</div>
			<div class="admin-table-wrap" th:if="${!#lists.isEmpty(seatMap)}">
				<table class="admin-table">
					<thead>
						<tr>
							<th>座席番号</th>
							<th>種別</th>
							<th>定員</th>
							<th>状態</th>
							<th>操作</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="seat : ${seatMap}">
							<td th:text="${seat.seatNo}">S1</td>
							<td th:text="${seat.seatType}">1人席</td>
							<td th:text="${seat.capacity} + '名'">1名</td>
							<td>
								<span class="admin-status"
								      th:classappend="${seat.occupied} ? ' admin-status--progress' : ' admin-status--done'"
								      th:text="${seat.occupied} ? '利用中' : '空席'">空席</span>
							</td>
							<td>
								<form th:if="${!seat.occupied and canManageCafe}" th:action="@{/admin/cafe/reception}" method="post">
									<input type="hidden" name="seatNo" th:value="${seat.seatNo}">
									<input type="hidden" name="guestCount" th:value="${seat.capacity}">
									<button class="admin-button admin-button--ghost" type="submit">この席で発行</button>
								</form>
								<span th:if="${seat.occupied or !canManageCafe}">-</span>
							</td>
						</tr>
					</tbody>
				</table>
			</div>
		</section>

		<section class="admin-card" th:if="${!#lists.isEmpty(activeSessionViews)}">
			<div class="admin-card-header">
				<div>
					<h2>利用中セッション一覧</h2>
				</div>
			</div>
			<div class="admin-cafe-active-grid">
				<div th:each="view : ${activeSessionViews}" class="admin-cafe-active-card">
					<div class="admin-cafe-active-qr">
					<img th:if="${view.qrDataUrl != null}"
					     th:src="${view.qrDataUrl}"
					     alt="注文QRコード"
					     style="width:120px;height:120px;border:1px solid #e7d9ca;border-radius:10px;background:#fff;padding:6px;">
					</div>
					<div class="admin-cafe-active-meta">
						<p><strong th:text="${view.session.seatNo}">A-01</strong> / <span th:text="${view.session.guestCount + '名'}">2名</span></p>
						<p th:text="${'期限: ' + #temporals.format(view.session.expiresAt, 'MM/dd HH:mm')}">期限: 04/09 18:20</p>
						<p>
							<a th:href="${view.orderUrl}" target="_blank" rel="noopener noreferrer">注文URL</a>
						</p>
						<form th:action="@{/admin/cafe/sessions/{token}/checkout(token=${view.session.sessionToken})}" method="post">
							<button class="admin-button admin-button--ghost" th:if="${canManageCafe}" type="submit">会計完了</button>
						</form>
					</div>
				</div>
			</div>
		</section>
	</div>
</body>
</html>
