<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>ダッシュボード | はむのくらし</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/admin.css}">
</head>
<body class="admin-body">
	<div class="admin-shell">
		<header class="admin-header">
			<div>
				<p class="admin-eyebrow">HAMU NO KURASHI</p>
				<h1 th:text="${adminDisplayName}">ダッシュボード</h1>
				<p class="admin-lead">管理画面の主な機能へ移動できます。</p>
			</div>
			<form th:action="@{/admin/logout}" method="post">
				<button class="admin-button admin-button--ghost" type="submit">ログアウト</button>
			</form>
		</header>

		<div th:replace="~{admin/fragments :: adminNav(${adminSection})}"></div>

		<section class="admin-summary-grid">
			<article class="admin-summary-card">
				<h2>お問い合わせ件数</h2>
				<p class="admin-summary-number" th:text="${inquiryCount}">0</p>
			</article>
			<article class="admin-summary-card">
				<h2>未対応</h2>
				<p class="admin-summary-number" th:text="${newInquiryCount}">0</p>
			</article>
			<article class="admin-summary-card">
				<h2>会員数</h2>
				<p class="admin-summary-number" th:text="${memberCount}">0</p>
			</article>
			<article class="admin-summary-card">
				<h2>ハムスター数</h2>
				<p class="admin-summary-number" th:text="${hamsterCount}">0</p>
			</article>
		</section>

		<section class="admin-card">
			<details class="admin-accordion" th:open="${chatOpen}">
				<summary>スタッフチャットを開く</summary>
				<p class="admin-alert admin-alert--error" th:if="${chatError}" th:text="${chatError}">エラーがあります。</p>

				<div class="admin-history-list" th:if="${!#lists.isEmpty(messages)}">
					<article class="admin-history-item"
					         th:each="message : ${messages}"
					         th:classappend="${currentEmployeeId != null and message.senderEmployeeId == currentEmployeeId} ? ' admin-history-item--self' : ' admin-history-item--other'">
						<p class="admin-help-text" th:text="${message.senderName + ' / ' + #temporals.format(message.sentAt, 'yyyy/MM/dd HH:mm')}">sender</p>
						<div class="admin-message-box" th:text="${message.body}">message</div>
					</article>
				</div>
				<p th:if="${#lists.isEmpty(messages)}">メッセージはまだありません。</p>

				<form class="admin-form" th:action="@{/admin/dashboard/chat}" th:object="${chatForm}" method="post">
					<label class="admin-field">
						<span>メッセージ</span>
						<textarea class="admin-textarea" th:field="*{body}" rows="4" placeholder="連絡内容を入力してください"></textarea>
						<small class="admin-field-error" th:if="${#fields.hasErrors('body')}" th:errors="*{body}">Error</small>
					</label>
					<button class="admin-button" type="submit">送信する</button>
				</form>
			</details>
		</section>

	</div>
</body>
</html>
