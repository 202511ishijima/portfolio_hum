<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>問い合わせ一覧 | はむのくらし</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/admin.css}">
</head>
<body class="admin-body">
	<div class="admin-shell">
		<header class="admin-header">
			<div>
				<p class="admin-eyebrow">HAMU NO KURASHI</p>
				<h1>問い合わせ一覧</h1>
				<p class="admin-lead">届いたお問い合わせを並び替えながら確認できます。</p>
			</div>
			<form th:action="@{/admin/logout}" method="post">
				<button class="admin-button admin-button--ghost" type="submit">ログアウト</button>
			</form>
		</header>

		<section class="admin-summary-grid">
			<article class="admin-summary-card">
				<h2>総件数</h2>
				<p class="admin-summary-number" th:text="${#lists.size(inquiries)}">0</p>
			</article>
			<article class="admin-summary-card">
				<h2>未対応</h2>
				<p class="admin-summary-number" th:text="${#lists.size(inquiries.?[status == 'NEW'])}">0</p>
			</article>
			<article class="admin-summary-card">
				<h2>対応中</h2>
				<p class="admin-summary-number" th:text="${#lists.size(inquiries.?[status == 'IN_PROGRESS'])}">0</p>
			</article>
			<article class="admin-summary-card">
				<h2>完了</h2>
				<p class="admin-summary-number" th:text="${#lists.size(inquiries.?[status == 'COMPLETED'])}">0</p>
			</article>
		</section>

		<section class="admin-card">
			<div class="admin-card-header">
				<div>
					<h2>受信一覧</h2>
					<p th:if="${!#lists.isEmpty(inquiries)}">見出しを押すと昇順・降順を切り替えられます。</p>
					<p th:if="${#lists.isEmpty(inquiries)}">まだお問い合わせはありません。</p>
				</div>
			</div>

			<div class="admin-table-wrap" th:if="${!#lists.isEmpty(inquiries)}">
				<table class="admin-table">
					<thead>
						<tr>
							<th>
								<a class="admin-sort-link"
								   th:classappend="${sort == 'id'} ? ' is-active' : ''"
								   th:href="@{/admin/inquiries(sort='id', order=${sort == 'id' and order == 'asc' ? 'desc' : 'asc'})}">
									ID
									<span class="admin-sort-icon" th:if="${sort == 'id'}" th:text="${order == 'asc' ? '▲' : '▼'}">▼</span>
								</a>
							</th>
							<th>
								<a class="admin-sort-link"
								   th:classappend="${sort == 'createdAt'} ? ' is-active' : ''"
								   th:href="@{/admin/inquiries(sort='createdAt', order=${sort == 'createdAt' and order == 'asc' ? 'desc' : 'asc'})}">
									受信日時
									<span class="admin-sort-icon" th:if="${sort == 'createdAt'}" th:text="${order == 'asc' ? '▲' : '▼'}">▼</span>
								</a>
							</th>
							<th>
								<a class="admin-sort-link"
								   th:classappend="${sort == 'name'} ? ' is-active' : ''"
								   th:href="@{/admin/inquiries(sort='name', order=${sort == 'name' and order == 'asc' ? 'desc' : 'asc'})}">
									お名前
									<span class="admin-sort-icon" th:if="${sort == 'name'}" th:text="${order == 'asc' ? '▲' : '▼'}">▼</span>
								</a>
							</th>
							<th>
								<a class="admin-sort-link"
								   th:classappend="${sort == 'email'} ? ' is-active' : ''"
								   th:href="@{/admin/inquiries(sort='email', order=${sort == 'email' and order == 'asc' ? 'desc' : 'asc'})}">
									メールアドレス
									<span class="admin-sort-icon" th:if="${sort == 'email'}" th:text="${order == 'asc' ? '▲' : '▼'}">▼</span>
								</a>
							</th>
							<th>
								<a class="admin-sort-link"
								   th:classappend="${sort == 'subject'} ? ' is-active' : ''"
								   th:href="@{/admin/inquiries(sort='subject', order=${sort == 'subject' and order == 'asc' ? 'desc' : 'asc'})}">
									件名
									<span class="admin-sort-icon" th:if="${sort == 'subject'}" th:text="${order == 'asc' ? '▲' : '▼'}">▼</span>
								</a>
							</th>
							<th>
								<a class="admin-sort-link"
								   th:classappend="${sort == 'status'} ? ' is-active' : ''"
								   th:href="@{/admin/inquiries(sort='status', order=${sort == 'status' and order == 'asc' ? 'desc' : 'asc'})}">
									対応状況
									<span class="admin-sort-icon" th:if="${sort == 'status'}" th:text="${order == 'asc' ? '▲' : '▼'}">▼</span>
								</a>
							</th>
							<th></th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="inquiry : ${inquiries}">
							<td th:text="${inquiry.id}">1</td>
							<td th:text="${#temporals.format(inquiry.createdAt, 'yyyy/MM/dd HH:mm')}">2026/03/18 10:00</td>
							<td th:text="${inquiry.name}">石島 智司</td>
							<td th:text="${inquiry.email}">sample@example.com</td>
							<td th:text="${inquiry.subject}">件名</td>
							<td>
								<span class="admin-status"
								      th:classappend="${inquiry.status == 'NEW'} ? ' admin-status--new' : (${inquiry.status == 'IN_PROGRESS'} ? ' admin-status--progress' : ' admin-status--done')"
								      th:text="${inquiry.status == 'NEW'} ? '未対応' : (${inquiry.status == 'IN_PROGRESS'} ? '対応中' : '完了')">
									未対応
								</span>
							</td>
							<td>
								<a class="admin-link-button" th:href="@{/admin/inquiries/{id}(id=${inquiry.id})}">詳細を見る</a>
							</td>
						</tr>
					</tbody>
				</table>
			</div>
		</section>
	</div>
</body>
</html>
