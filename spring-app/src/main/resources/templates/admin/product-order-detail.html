<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>発注履歴詳細 | はむのくらし</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/admin.css}">
</head>
<body class="admin-body">
	<div class="admin-shell">
		<header class="admin-header">
			<div>
				<p class="admin-eyebrow">HAMU NO KURASHI</p>
				<h1>発注履歴詳細</h1>
				<p class="admin-lead">1回の発注で登録された商品ごとの明細です。</p>
			</div>
			<div class="admin-header-actions">
				<a class="admin-link-button admin-button--ghost" th:href="@{/admin/products/stocks}">在庫一覧へ戻る</a>
			</div>
		</header>

		<div th:replace="~{admin/fragments :: adminNav(${adminSection})}"></div>

		<section class="admin-card">
			<div class="admin-card-header">
				<div>
					<h2>発注情報</h2>
				</div>
			</div>
			<div class="admin-detail-list">
				<div>
					<dt>発注ID</dt>
					<dd th:text="${group.groupKey}">group-id</dd>
				</div>
				<div>
					<dt>商品カテゴリー</dt>
					<dd th:text="${group.categoryLabel}">フード</dd>
				</div>
				<div>
					<dt>合計発注数</dt>
					<dd th:text="${group.totalQuantity}">20</dd>
				</div>
				<div>
					<dt>発注者</dt>
					<dd th:text="${group.orderedBy}">admin</dd>
				</div>
				<div>
					<dt>備考</dt>
					<dd th:text="${group.note != null && !group.note.isBlank() ? group.note : '-'}">一括発注</dd>
				</div>
				<div>
					<dt>登録日時</dt>
					<dd th:text="${group.createdAt != null ? #temporals.format(group.createdAt, 'yyyy/MM/dd HH:mm') : '-'}">2026/04/09 13:22</dd>
				</div>
			</div>
		</section>

		<section class="admin-card">
			<div class="admin-card-header">
				<div>
					<h2>商品別の発注数</h2>
				</div>
			</div>
			<div class="admin-table-wrap">
				<table class="admin-table">
					<thead>
						<tr>
							<th>商品ID</th>
							<th>商品カテゴリー</th>
							<th>商品名</th>
							<th>発注数</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="row : ${rows}">
							<td th:text="${row.productId}">food-01</td>
							<td th:text="${productCategories[row.productId] != null ? productCategories[row.productId] : '-'}">フード</td>
							<td th:text="${productNames[row.productId] != null ? productNames[row.productId] : row.productId}">主食フード</td>
							<td th:text="${row.quantity}">10</td>
						</tr>
					</tbody>
				</table>
			</div>
		</section>
	</div>
</body>
</html>
