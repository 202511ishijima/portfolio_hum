<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>発券レシート | はむのくらし</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/admin.css}">
</head>
<body class="admin-body">
	<div class="admin-shell admin-shell--narrow">
		<section class="admin-card">
			<div class="admin-card-header">
				<div>
					<h2>発券レシート</h2>
				</div>
			</div>
			<div style="display:grid;gap:12px;justify-items:start;">
				<img th:if="${issuedQrDataUrl != null}"
				     th:src="${issuedQrDataUrl}"
				     alt="注文QRコード"
				     style="width:220px;height:220px;border:1px solid #e7d9ca;border-radius:12px;background:#fff;padding:10px;">
			</div>
			<ul class="check-list">
				<li th:text="'座席番号: ' + ${issuedSession.seatNo}">座席番号: S1</li>
				<li th:text="'人数: ' + ${issuedSession.guestCount} + '名'">人数: 2名</li>
				<li th:text="'有効期限: ' + ${#temporals.format(issuedSession.expiresAt, 'yyyy/MM/dd HH:mm')}">有効期限</li>
				<li>注文URL:
					<a th:href="${issuedOrderUrl}" th:text="${issuedOrderUrl}" target="_blank" rel="noopener noreferrer"></a>
				</li>
			</ul>
		</section>
	</div>
</body>
</html>
