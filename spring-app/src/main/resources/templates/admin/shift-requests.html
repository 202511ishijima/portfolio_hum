<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>シフト希望 | はむのくらし</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/admin.css}">
</head>
<body class="admin-body">
	<div class="admin-shell">
		<header class="admin-header">
			<div>
				<p class="admin-eyebrow">HAMU NO KURASHI</p>
				<h1>シフト希望</h1>
				<p class="admin-lead" th:text="${monthLabel + ' の希望シフトを登録します。'}">月間希望シフト登録</p>
			</div>
					<p class="admin-help-text" th:text="${monthLabel + ' の希望を保存します。'}">2026年5月 の希望を保存します。</p>
					<div class="admin-header-actions">
				<a class="admin-link-button admin-button--ghost" th:href="@{/admin/shifts(year=${targetYear},month=${targetMonth})}">シフト一覧へ戻る</a>
				<form th:action="@{/admin/logout}" method="post">
					<button class="admin-button admin-button--ghost" type="submit">ログアウト</button>
				</form>
			</div>
		</header>

		<div th:replace="~{admin/fragments :: adminNav(${adminSection})}"></div>

		<p class="admin-alert admin-alert--success" th:if="${shiftMessage}" th:text="${shiftMessage}">保存しました。</p>
		<p class="admin-alert admin-alert--error" th:if="${shiftError}" th:text="${shiftError}">エラーがあります。</p>

		<section class="admin-card" th:if="${#lists.isEmpty(employees)}">
			<p>希望を登録できる従業員がいません。</p>
		</section>

		<section class="admin-card" th:if="${!#lists.isEmpty(employees)}">
			<div class="admin-card-header">
				<div>
					<h2>希望入力</h2>
					<p>日付チェックを付けたセルだけ一括適用できます。</p>
				</div>
			</div>

			<form class="admin-form" th:action="@{/admin/shifts/requests}" method="get">
				<input type="hidden" name="year" th:value="${targetYear}">
				<input type="hidden" name="month" th:value="${targetMonth}">
				<label class="admin-field">
					<span>従業員</span>
					<select name="employeeId" onchange="this.form.submit()">
						<option th:each="employee : ${employees}"
						        th:selected="${employee.id == selectedEmployeeId}"
						        th:value="${employee.id}"
						        th:text="${employee.name + '（' + employee.position + '）'}">山田 花子</option>
					</select>
				</label>
			</form>

			<form class="admin-form" th:action="@{/admin/shifts/requests/save}" method="post">
				<input type="hidden" name="year" th:value="${targetYear}">
				<input type="hidden" name="month" th:value="${targetMonth}">
				<input type="hidden" name="employeeId" th:value="${selectedEmployeeId}">

				<div class="admin-filter-grid">
					<label class="admin-field">
						<span>週何回勤務</span>
						<input type="number" id="weekly-days-input" name="weeklyDays" min="1" max="7" th:value="${weeklyDays}">
					</label>
					<label class="admin-field">
						<span>一括区分</span>
						<select id="bulk-slot">
							<option value=""></option>
							<option value="OFF">休み</option>
							<option value="EARLY">早番</option>
							<option value="LATE">遅番</option>
							<option value="FULL">終日</option>
							<option value="FLEX">早番か遅番</option>
						</select>
					</label>
					<div class="admin-filter-actions">
						<button class="admin-button admin-button--ghost" type="button" id="bulk-apply">一括適用</button>
					</div>
				</div>

				<div class="admin-header-actions">
					<button class="admin-button admin-button--ghost" type="button" id="target-all">対象: 全日</button>
					<button class="admin-button admin-button--ghost" type="button" id="target-weekday">対象: 平日</button>
					<button class="admin-button admin-button--ghost" type="button" id="target-weekend">対象: 土日祝</button>
					<button class="admin-button admin-button--ghost" type="button" id="target-clear">対象: 解除</button>
				</div>

					<p class="admin-help-text admin-shift-month-label" th:text="${monthLabel}">2026年5月</p>
					<div class="admin-shift-request-calendar">
					<div class="admin-shift-request-weekday">月</div>
					<div class="admin-shift-request-weekday">火</div>
					<div class="admin-shift-request-weekday">水</div>
					<div class="admin-shift-request-weekday">木</div>
					<div class="admin-shift-request-weekday">金</div>
					<div class="admin-shift-request-weekday admin-shift-request-weekday--sat">土</div>
					<div class="admin-shift-request-weekday admin-shift-request-weekday--sun">日</div>

					<div th:if="${leadingBlankCount > 0}"
					     class="admin-shift-request-day admin-shift-request-day--blank"
					     th:each="i : ${#numbers.sequence(1, leadingBlankCount)}"></div>

					<div th:each="day : ${monthDays}"
					     class="admin-shift-request-day"
					     th:classappend="${holidayNameMap[#temporals.format(day, 'yyyy-MM-dd')] != null} ? ' admin-shift-request-day--holiday' : (${day.dayOfWeek.value == 6} ? ' admin-shift-request-day--sat' : (${day.dayOfWeek.value == 7} ? ' admin-shift-request-day--sun' : ''))">
						<div class="admin-shift-request-day-head">
							<span class="admin-shift-request-day-num" th:text="${day.dayOfMonth}">1</span>
							<span class="admin-shift-request-day-week" th:text="${#temporals.format(day, 'E')}">月</span>
						</div>
						<p class="admin-shift-holiday-name"
						   th:if="${holidayNameMap[#temporals.format(day, 'yyyy-MM-dd')] != null}"
						   th:text="${holidayNameMap[#temporals.format(day, 'yyyy-MM-dd')]}">昭和の日</p>
						<label class="admin-shift-target-check">
							<input class="admin-shift-target-day"
							       type="checkbox"
							       checked
							       th:attr="data-day=${day.dayOfWeek.value},data-holiday=${holidayNameMap[#temporals.format(day, 'yyyy-MM-dd')] != null} ? '1' : '0'">
							<span>対象</span>
						</label>
						<select class="admin-shift-request-select"
						        th:attr="name=${'day_' + #temporals.format(day, 'yyyy-MM-dd')},data-day=${day.dayOfWeek.value}">
							<option value=""></option>
							<option value="OFF" th:selected="${requestMap[day] == 'OFF'}">休み</option>
							<option value="EARLY" th:selected="${requestMap[day] == 'EARLY'}">早番</option>
							<option value="LATE" th:selected="${requestMap[day] == 'LATE'}">遅番</option>
							<option value="FULL" th:selected="${requestMap[day] == 'FULL'}">終日</option>
							<option value="FLEX" th:selected="${requestMap[day] == 'FLEX'}">早番か遅番</option>
						</select>
					</div>

					<div th:if="${trailingBlankCount > 0}"
					     class="admin-shift-request-day admin-shift-request-day--blank"
					     th:each="i : ${#numbers.sequence(1, trailingBlankCount)}"></div>
				</div>

				<div class="admin-header-actions">
					<button class="admin-button" type="submit">希望を保存</button>
					<a class="admin-link-button admin-button--ghost" th:href="@{/admin/shifts(year=${targetYear},month=${targetMonth})}">キャンセル</a>
				</div>
			</form>
		</section>
	</div>

	<script>
		document.addEventListener('DOMContentLoaded', function () {
			const applyButton = document.getElementById('bulk-apply');
			if (!applyButton) return;
			const targetChecks = Array.from(document.querySelectorAll('.admin-shift-target-day'));
			const selects = Array.from(document.querySelectorAll('.admin-shift-request-select'));
			const weeklyDaysInput = document.getElementById('weekly-days-input');
			const form = document.querySelector('form[action="/admin/shifts/requests/save"]');
			const year = document.querySelector('input[name="year"]')?.value || '';
			const month = document.querySelector('input[name="month"]')?.value || '';
			const employeeId = document.querySelector('input[name="employeeId"]')?.value || '';
			const storageKey = `shift-requests:${year}-${month}:emp:${employeeId}`;

			const saveLocal = () => {
				const payload = {
					weeklyDays: weeklyDaysInput ? weeklyDaysInput.value : '',
					dayValues: selects.map((select) => select.value),
					targetFlags: targetChecks.map((check) => !!check.checked)
				};
				localStorage.setItem(storageKey, JSON.stringify(payload));
			};

			const restoreLocal = () => {
				const raw = localStorage.getItem(storageKey);
				if (!raw) return;
				try {
					const payload = JSON.parse(raw);
					if (weeklyDaysInput && payload.weeklyDays != null) {
						weeklyDaysInput.value = payload.weeklyDays;
					}
					if (Array.isArray(payload.dayValues)) {
						selects.forEach((select, index) => {
							if (payload.dayValues[index] !== undefined) {
								select.value = payload.dayValues[index];
							}
						});
					}
					if (Array.isArray(payload.targetFlags)) {
						targetChecks.forEach((check, index) => {
							if (payload.targetFlags[index] !== undefined) {
								check.checked = !!payload.targetFlags[index];
							}
						});
					}
				} catch (e) {
					localStorage.removeItem(storageKey);
				}
			};

			restoreLocal();

			const setTargets = (mode) => {
				targetChecks.forEach((check) => {
					const day = Number(check.dataset.day || '0');
					const isWeekend = day === 6 || day === 7;
					const isHoliday = check.dataset.holiday === '1';
					if (mode === 'all') check.checked = true;
					if (mode === 'weekday') check.checked = !isWeekend && !isHoliday;
					if (mode === 'weekend') check.checked = isWeekend || isHoliday;
					if (mode === 'clear') check.checked = false;
				});
				saveLocal();
			};

			document.getElementById('target-all')?.addEventListener('click', () => setTargets('all'));
			document.getElementById('target-weekday')?.addEventListener('click', () => setTargets('weekday'));
			document.getElementById('target-weekend')?.addEventListener('click', () => setTargets('weekend'));
			document.getElementById('target-clear')?.addEventListener('click', () => setTargets('clear'));

			applyButton.addEventListener('click', function () {
				const slot = document.getElementById('bulk-slot').value;
				selects.forEach((select, index) => {
					const targetCheck = targetChecks[index];
					if (targetCheck && targetCheck.checked) {
						select.value = slot;
					}
				});
				saveLocal();
			});

			selects.forEach((select) => select.addEventListener('change', saveLocal));
			targetChecks.forEach((check) => check.addEventListener('change', saveLocal));
			weeklyDaysInput?.addEventListener('input', saveLocal);
			form?.addEventListener('submit', saveLocal);
		});
	</script>
</body>
</html>
