<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>発注登録 | はむのくらし</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/admin.css}">
</head>
<body class="admin-body">
	<div class="admin-shell">
		<header class="admin-header">
			<div>
				<p class="admin-eyebrow">HAMU NO KURASHI</p>
				<h1>発注登録</h1>
				<p class="admin-lead">商品ごとに発注数と推奨在庫数を設定できます。</p>
			</div>
			<div class="admin-header-actions">
				<a class="admin-link-button admin-button--ghost" th:href="@{/admin/products/stocks}">在庫一覧へ戻る</a>
			</div>
		</header>

		<div th:replace="~{admin/fragments :: adminNav(${adminSection})}"></div>

		<p class="admin-alert admin-alert--error" th:if="${productError}" th:text="${productError}">入力内容を確認してください。</p>

		<section class="admin-card">
			<div class="admin-card-header">
				<div>
					<h2>一括発注</h2>
					<p>「推奨在庫に合わせる」で、発注数を一括で自動計算できます。</p>
				</div>
				<button class="admin-button admin-button--ghost" type="button" id="fill-recommended-order">推奨在庫に合わせる</button>
			</div>

			<form class="admin-form" th:action="@{/admin/products/orders/new}" th:object="${orderForm}" method="post">
				<div class="admin-table-wrap">
					<table class="admin-table">
						<thead>
							<tr>
								<th>商品ID</th>
								<th>商品名</th>
								<th>現在在庫</th>
								<th>推奨在庫数</th>
								<th>発注数</th>
							</tr>
						</thead>
						<tbody>
							<tr th:each="line, stat : *{items}">
								<td>
									<span th:text="${line.productId}">cage-01</span>
									<input type="hidden" th:field="*{items[__${stat.index}__].productId}">
								</td>
								<td th:text="${productNames[line.productId] != null ? productNames[line.productId] : '-'}">サンプル</td>
								<td>
									<span th:text="${stockMap[line.productId] != null ? stockMap[line.productId] : 0}">30</span>
								</td>
								<td>
									<input type="number"
									       min="1"
									       th:field="*{items[__${stat.index}__].recommendedStock}"
									       th:attr="data-recommended-input=${line.productId}">
								</td>
								<td>
									<input type="number"
									       min="0"
									       th:field="*{items[__${stat.index}__].quantity}"
									       th:attr="data-order-input=${line.productId},data-current-stock=${stockMap[line.productId] != null ? stockMap[line.productId] : 0}">
								</td>
							</tr>
						</tbody>
					</table>
				</div>

				<div class="admin-header-actions">
					<button class="admin-button" type="submit">発注を登録</button>
					<a class="admin-link-button admin-button--ghost" th:href="@{/admin/products/stocks}">キャンセル</a>
				</div>
			</form>
		</section>
	</div>

	<script>
		document.getElementById('fill-recommended-order')?.addEventListener('click', () => {
			document.querySelectorAll('[data-order-input]').forEach((orderInput) => {
				const productId = orderInput.dataset.orderInput;
				const currentStock = Number(orderInput.dataset.currentStock || 0);
				const recommendedInput = document.querySelector(`[data-recommended-input="${productId}"]`);
				const recommended = Number(recommendedInput?.value || 0);
				const quantity = Math.max(0, recommended - currentStock);
				orderInput.value = String(quantity);
			});
		});
	</script>
</body>
</html>
