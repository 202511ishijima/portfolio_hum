<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>棚卸 | はむのくらし</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/admin.css}">
</head>
<body class="admin-body">
	<div class="admin-shell">
		<header class="admin-header">
			<div>
				<p class="admin-eyebrow">HAMU NO KURASHI</p>
				<h1>棚卸</h1>
				<p class="admin-lead">在庫の実数を確認し、差分を反映します。</p>
			</div>
			<div class="admin-header-actions">
				<a class="admin-link-button admin-button--ghost" th:href="@{/admin/products/stocks}">在庫一覧へ戻る</a>
			</div>
		</header>

		<nav class="admin-nav" aria-label="管理メニュー">
			<a class="admin-nav-link" th:href="@{/admin/dashboard}">ダッシュボード</a>
			<a class="admin-nav-link" th:href="@{/admin/inquiries}">お問い合わせ一覧</a>
			<a class="admin-nav-link" th:href="@{/admin/members}">会員管理</a>
			<a class="admin-nav-link" th:href="@{/admin/employees}">従業員管理</a>
			<a class="admin-nav-link" th:href="@{/admin/shifts}">シフト管理</a>
			<a class="admin-nav-link" th:href="@{/admin/hamsters}">ハムスター管理</a>
			<a class="admin-nav-link is-active" th:href="@{/admin/products/stocks}">商品在庫管理</a>
		</nav>

		<p class="admin-alert admin-alert--success" th:if="${productMessage}" th:text="${productMessage}">棚卸を反映しました。</p>
		<p class="admin-alert admin-alert--error" th:if="${productError}" th:text="${productError}">更新に失敗しました。</p>

		<section class="admin-card">
			<div class="admin-card-header">
				<div>
					<h2>棚卸調整</h2>
					<p>推定在庫数と実在庫数の差分を自動計算して反映します。</p>
				</div>
				<button class="admin-button" type="submit" form="bulk-inventory-form">一括反映</button>
			</div>

			<form th:if="${!#maps.isEmpty(stocks)}" id="bulk-inventory-form" th:action="@{/admin/products/inventory/bulk-adjust}" method="post">
				<div class="admin-table-wrap">
					<table class="admin-table">
						<thead>
							<tr>
								<th>商品ID</th>
								<th>商品名</th>
								<th>推定在庫数</th>
								<th>実際の在庫数</th>
							</tr>
						</thead>
						<tbody>
							<tr th:each="entry : ${stocks}">
								<td>
									<span th:text="${entry.key}">cage-01</span>
									<input type="hidden" name="productIds" th:value="${entry.key}">
								</td>
								<td th:text="${productNames[entry.key] != null ? productNames[entry.key] : '-'}">サンプル</td>
								<td>
									<span th:text="${entry.value}">30</span>
									<input type="hidden" name="estimatedStocks" th:value="${entry.value}">
								</td>
								<td>
									<input type="number"
									       min="0"
									       name="actualStocks"
									       th:value="${entry.value}"
									       required>
								</td>
							</tr>
						</tbody>
					</table>
				</div>
			</form>
			<p th:if="${#maps.isEmpty(stocks)}">在庫データがまだありません。商品ページで商品表示後に作成されます。</p>
		</section>
	</div>
</body>
</html>
