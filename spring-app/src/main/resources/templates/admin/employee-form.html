<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title th:text="${mode == 'create'} ? '従業員作成 | はむのくらし' : '従業員編集 | はむのくらし'">従業員編集 | はむのくらし</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/admin.css}">
</head>
<body class="admin-body">
	<div class="admin-shell admin-shell--narrow">
		<header class="admin-header">
			<div>
				<p class="admin-eyebrow">HAMU NO KURASHI</p>
				<h1 th:text="${mode == 'create'} ? '従業員作成' : '従業員編集'">従業員編集</h1>
				<p class="admin-lead">役職はプルダウンから選択できます。権限は役職に応じて自動で設定されます。</p>
			</div>
			<div class="admin-header-actions">
				<a class="admin-link-button admin-button--ghost" th:href="@{/admin/employees}">一覧へ戻る</a>
				<form th:action="@{/admin/logout}" method="post">
					<button class="admin-button admin-button--ghost" type="submit">ログアウト</button>
				</form>
			</div>
		</header>

		<div th:replace="~{admin/fragments :: adminNav(${adminSection})}"></div>

		<p class="admin-alert admin-alert--error" th:if="${employeeError}" th:text="${employeeError}">エラーがあります。</p>

		<section class="admin-card">
			<form class="admin-form"
			      th:object="${employeeForm}"
			      th:action="${mode == 'create'} ? @{/admin/employees/new} : @{/admin/employees/{id}/edit(id=${employee.id})}"
			      method="post">

				<label class="admin-field">
					<span>氏名</span>
					<input th:field="*{name}" type="text" placeholder="例: 山田 花子">
					<small class="admin-field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Error</small>
				</label>

				<label class="admin-field">
					<span>ログインID</span>
					<input th:field="*{email}" type="text" placeholder="staff01">
					<small class="admin-field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">Error</small>
				</label>

				<label class="admin-field">
					<span th:text="${mode == 'create'} ? 'パスワード' : 'パスワード（変更時のみ入力）'">パスワード</span>
					<input th:field="*{password}" type="password" placeholder="8文字以上">
					<small class="admin-field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">Error</small>
				</label>

				<label class="admin-field">
					<span>役職</span>
					<select th:field="*{position}">
						<option value="">選択してください</option>
						<option th:each="position : ${positionOptions}"
						        th:value="${position}"
						        th:text="${position}">一般従業員</option>
					</select>
					<small class="admin-field-error" th:if="${#fields.hasErrors('position')}" th:errors="*{position}">Error</small>
				</label>

				<label class="admin-field">
					<span>在籍状態</span>
					<select th:field="*{active}">
						<option th:value="true">有効</option>
						<option th:value="false">無効</option>
					</select>
					<small class="admin-field-error" th:if="${#fields.hasErrors('active')}" th:errors="*{active}">Error</small>
				</label>

				<div class="admin-header-actions">
					<button class="admin-button" type="submit" th:text="${mode == 'create'} ? '作成する' : '更新する'">保存する</button>
					<a class="admin-link-button admin-button--ghost" th:href="@{/admin/employees}">キャンセル</a>
				</div>
			</form>

			<div class="admin-card-section" th:if="${mode == 'edit' and employee != null}">
				<h3>アカウント削除</h3>
				<form th:action="@{/admin/employees/{id}/delete(id=${employee.id})}" method="post">
					<button class="admin-button admin-button--danger"
					        type="submit"
					        onclick="return confirm('この従業員アカウントを削除しますか？');">この従業員を削除する</button>
				</form>
			</div>
		</section>
	</div>
</body>
</html>
