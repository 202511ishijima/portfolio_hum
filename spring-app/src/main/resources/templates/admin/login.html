<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>管理者ログイン | はむのくらし</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/admin.css}">
</head>
<body class="admin-body admin-login-body">
	<main class="admin-login-shell">
		<section class="admin-login-card">
			<p class="admin-eyebrow">ADMIN</p>
			<h1>管理画面ログイン</h1>
			<p class="admin-lead">お問い合わせの確認や対応状況の更新を行うための管理画面です。</p>

			<p class="admin-alert admin-alert--error" th:if="${param.error}">ログインIDまたはパスワードが正しくありません。</p>
			<p class="admin-alert admin-alert--success" th:if="${param.logout}">ログアウトしました。</p>

			<form class="admin-form" th:action="@{/admin/login}" method="post">
				<label class="admin-field">
					<span>ログインID</span>
					<input id="username" name="username" type="text" autocomplete="username" required>
				</label>
				<label class="admin-field">
					<span>パスワード</span>
					<input id="password" name="password" type="password" autocomplete="current-password" required>
				</label>
				<button class="admin-button" type="submit">ログイン</button>
			</form>

			<div class="admin-login-note">
				<p>確認用アカウント</p>
				<p>ID: <strong>admin</strong></p>
				<p>Password: <strong>admin1234</strong></p>
			</div>
		</section>
	</main>
</body>
</html>
