<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>役職権限変更 | はむのくらし</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/admin.css}">
</head>
<body class="admin-body">
	<div class="admin-shell">
		<header class="admin-header">
			<div>
				<p class="admin-eyebrow">HAMU NO KURASHI</p>
				<h1>役職権限変更</h1>
				<p class="admin-lead">役職ごとのデフォルトロールと、管理メニューへのアクセス権限を細かく編集できます。</p>
			</div>
			<div class="admin-header-actions">
				<a class="admin-link-button admin-button--ghost" th:href="@{/admin/employees}">従業員一覧へ戻る</a>
				<form th:action="@{/admin/logout}" method="post">
					<button class="admin-button admin-button--ghost" type="submit">ログアウト</button>
				</form>
			</div>
		</header>

		<div th:replace="~{admin/fragments :: adminNav(${adminSection})}"></div>

		<p class="admin-alert admin-alert--success" th:if="${employeeMessage}" th:text="${employeeMessage}">更新しました。</p>
		<p class="admin-alert admin-alert--error" th:if="${employeeError}" th:text="${employeeError}">エラーがあります。</p>

		<section class="admin-card">
			<div class="admin-card-header">
				<div>
					<h2>役職ごとの権限設定</h2>
					<p>チェックを入れたメニューが表示され、対応URLにもアクセス可能になります。</p>
				</div>
			</div>

			<div class="admin-table-wrap" th:if="${!#lists.isEmpty(permissions)}">
				<table class="admin-table">
					<thead>
						<tr>
							<th>役職</th>
							<th>ダッシュボード</th>
							<th>お問い合わせ</th>
							<th>会員管理</th>
							<th>従業員管理</th>
							<th>シフト管理</th>
							<th>ハムスター管理</th>
							<th>商品在庫管理</th>
							<th>カフェ注文</th>
							<th>保存</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="permission, stat : ${permissions}">
							<th:block th:with="formId=${'perm-form-' + stat.index}">
								<td th:text="${permission.position}">一般従業員</td>
								<td><input type="checkbox" name="canDashboard" th:checked="${permission.canDashboard}" th:attr="form=${formId}"></td>
								<td><input type="checkbox" name="canInquiries" th:checked="${permission.canInquiries}" th:attr="form=${formId}"></td>
								<td><input type="checkbox" name="canMembers" th:checked="${permission.canMembers}" th:attr="form=${formId}"></td>
								<td><input type="checkbox" name="canEmployees" th:checked="${permission.canEmployees}" th:attr="form=${formId}"></td>
								<td><input type="checkbox" name="canShifts" th:checked="${permission.canShifts}" th:attr="form=${formId}"></td>
								<td><input type="checkbox" name="canHamsters" th:checked="${permission.canHamsters}" th:attr="form=${formId}"></td>
								<td><input type="checkbox" name="canProducts" th:checked="${permission.canProducts}" th:attr="form=${formId}"></td>
								<td><input type="checkbox" name="canCafe" th:checked="${permission.canCafe}" th:attr="form=${formId}"></td>
								<td>
									<form th:id="${formId}" th:action="@{/admin/employees/permissions/{position}(position=${permission.position})}" method="post"></form>
									<button class="admin-button admin-button--ghost" type="submit" th:attr="form=${formId}">更新</button>
								</td>
							</th:block>
						</tr>
					</tbody>
				</table>
			</div>

			<p th:if="${#lists.isEmpty(permissions)}">役職権限設定が見つかりませんでした。</p>
		</section>
	</div>
</body>
</html>
