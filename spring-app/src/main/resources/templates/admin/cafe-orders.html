<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>カフェ注文管理 | はむのくらし</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/admin.css}">
</head>
<body class="admin-body">
	<div class="admin-shell">
		<header class="admin-header">
			<div>
				<p class="admin-eyebrow">HAMU NO KURASHI</p>
				<h1>カフェ注文管理</h1>
				<p class="admin-lead">座席ごとの注文内容とステータスを管理できます。</p>
			</div>
			<div class="admin-header-actions">
				<a class="admin-link-button admin-button--ghost" th:href="@{/admin/cafe/reception}">受付発行</a>
				<a class="admin-link-button admin-button--ghost" th:href="@{/admin/cafe/menu}">メニュー価格設定</a>
			</div>
		</header>

		<div th:replace="~{admin/fragments :: adminNav(${adminSection})}"></div>

		<p class="admin-alert admin-alert--success" th:if="${cafeMessage}" th:text="${cafeMessage}">更新しました。</p>
		<p class="admin-alert admin-alert--error" th:if="${cafeError}" th:text="${cafeError}">更新に失敗しました。</p>

		<section class="admin-card">
			<div class="admin-card-header">
				<div>
					<h2>注文一覧</h2>
					<p>会計時はステータスを「PAID」に変更すると売上に自動反映されます。</p>
				</div>
				<form class="admin-inline-form" method="get" th:action="@{/admin/cafe/orders}">
					<select name="status">
						<option value="">全ステータス</option>
						<option th:each="status : ${statusOptions}"
						        th:value="${status.name()}"
						        th:text="${status.name()}"
						        th:selected="${selectedStatus == status.name()}">NEW</option>
					</select>
					<button class="admin-button admin-button--ghost" type="submit">絞り込み</button>
				</form>
			</div>

			<div class="admin-table-wrap" th:if="${!#lists.isEmpty(orders)}">
				<table class="admin-table">
					<thead>
						<tr>
							<th>注文ID</th>
							<th>座席</th>
							<th>明細</th>
							<th>合計</th>
							<th>ステータス</th>
							<th>注文時刻</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="order : ${orders}">
							<td th:text="${order.id}">1</td>
							<td th:text="${order.seatNo}">A-01</td>
							<td>
								<div th:if="${orderItemsMap[order.id] != null}">
									<div th:each="item : ${orderItemsMap[order.id]}">
										<span th:text="${item.menuName}">メニュー名</span>
										<span th:text="' x ' + ${item.quantity}">x 1</span>
									</div>
								</div>
							</td>
							<td th:text="${order.total} + ' 円'">1000 円</td>
							<td>
								<form class="admin-inline-form" th:action="@{/admin/cafe/orders/{id}/status(id=${order.id})}" method="post">
									<select name="status">
										<option th:each="status : ${statusOptions}"
										        th:value="${status.name()}"
										        th:text="${status.name()}"
										        th:selected="${order.status == status}">NEW</option>
									</select>
									<button class="admin-button admin-button--ghost" th:if="${canManageCafe}" type="submit">更新</button>
								</form>
							</td>
							<td th:text="${order.createdAt != null ? #temporals.format(order.createdAt, 'yyyy/MM/dd HH:mm') : '-'}">2026/03/30 12:30</td>
						</tr>
					</tbody>
				</table>
			</div>
			<p th:if="${#lists.isEmpty(orders)}">注文データはまだありません。</p>
		</section>

		<section class="admin-card">
			<div class="admin-card-header">
				<div>
					<h2>売上（日次・直近14日）</h2>
				</div>
			</div>
			<div class="admin-table-wrap" th:if="${!#lists.isEmpty(salesDaily)}">
				<table class="admin-table">
					<thead>
						<tr>
							<th>日付</th>
							<th>注文数</th>
							<th>売上合計</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="day : ${salesDaily}">
							<td th:text="${day.salesDate}">2026-03-30</td>
							<td th:text="${day.orderCount}">4</td>
							<td th:text="${day.totalAmount} + ' 円'">12000 円</td>
						</tr>
					</tbody>
				</table>
			</div>
			<p th:if="${#lists.isEmpty(salesDaily)}">売上データはまだありません。</p>
		</section>
	</div>
</body>
</html>
