<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>顧客操作画面 | はむのくらし</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/admin.css}">
</head>
<body class="admin-body">
	<div class="admin-shell">
		<header class="admin-header">
			<div>
				<p class="admin-eyebrow">HAMU NO KURASHI</p>
				<h1>顧客操作画面</h1>
				<p class="admin-lead">人数を入力して席種をタップすると発券します。</p>
			</div>
			<div class="admin-header-actions">
				<a class="admin-link-button admin-button--ghost" th:href="@{/admin/cafe/reception}">従業員受付へ</a>
			</div>
		</header>

		<div th:replace="~{admin/fragments :: adminNav(${adminSection})}"></div>
		<p class="admin-alert admin-alert--error" th:if="${cafeError}" th:text="${cafeError}">処理に失敗しました。</p>

		<section class="admin-card admin-touch-card">
			<form id="customer-issue-form" class="admin-form" th:action="@{/admin/cafe/customer-screen/issue}" method="post" th:object="${cafeCustomerIssueForm}">
				<label class="admin-touch-row">
					<span class="admin-touch-label">人数</span>
					<input class="admin-touch-number" type="number" min="1" max="4" required th:field="*{guestCount}">
				</label>

				<div id="seat-tap-panel" class="admin-touch-row">
					<p class="admin-touch-label">席種（タップで発券）</p>
					<div class="admin-touch-seat-grid">
						<label class="admin-touch-seat-option">
							<input type="radio" th:field="*{seatPreference}" value="AUTO">
							<span>自動（おすすめ）</span>
						</label>
						<label class="admin-touch-seat-option">
							<input type="radio" th:field="*{seatPreference}" value="TABLE">
							<span>テーブル席</span>
						</label>
						<label class="admin-touch-seat-option">
							<input type="radio" th:field="*{seatPreference}" value="COUNTER">
							<span>カウンター席</span>
						</label>
					</div>
				</div>

			</form>
		</section>
	</div>

	<script>
		(() => {
			const form = document.getElementById("customer-issue-form");
			const seatPanel = document.getElementById("seat-tap-panel");
			if (!form || !seatPanel) {
				return;
			}
			const radios = Array.from(form.querySelectorAll('input[type="radio"][name="seatPreference"]'));
			radios.forEach((radio) => {
				radio.addEventListener("change", () => {
					form.submit();
				});
			});
			seatPanel.addEventListener("click", (event) => {
				const target = event.target;
				if (!(target instanceof HTMLElement)) {
					return;
				}
				const option = target.closest(".admin-touch-seat-option");
				if (!option) {
					return;
				}
				const radio = option.querySelector('input[type="radio"]');
				if (!radio) {
					return;
				}
				radio.checked = true;
				form.submit();
			});
		})();
	</script>
</body>
</html>
