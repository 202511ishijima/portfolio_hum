<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>問い合わせ詳細 | はむのくらし</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/admin.css}">
</head>
<body class="admin-body">
	<div class="admin-shell">
		<header class="admin-header">
			<div>
				<p class="admin-eyebrow">HAMU NO KURASHI</p>
				<h1>問い合わせ詳細</h1>
				<p class="admin-lead">内容の確認と対応状況の更新ができます。</p>
			</div>
			<div class="admin-header-actions">
				<a class="admin-link-button admin-button--ghost" th:href="@{/admin/inquiries}">一覧へ戻る</a>
				<form th:action="@{/admin/logout}" method="post">
					<button class="admin-button admin-button--ghost" type="submit">ログアウト</button>
				</form>
			</div>
		</header>

		<nav class="admin-nav" aria-label="管理メニュー">
			<a class="admin-nav-link"
			   th:classappend="${adminSection == 'dashboard'} ? ' is-active' : ''"
			   th:href="@{/admin/dashboard}">ダッシュボード</a>
			<a class="admin-nav-link"
			   th:classappend="${adminSection == 'inquiries'} ? ' is-active' : ''"
			   th:href="@{/admin/inquiries}">問い合わせ管理</a>
			<a class="admin-nav-link"
			   th:classappend="${adminSection == 'members'} ? ' is-active' : ''"
			   th:href="@{/admin/members}">会員管理</a>
		</nav>

		<p class="admin-alert admin-alert--success" th:if="${statusMessage}" th:text="${statusMessage}">対応状況を更新しました。</p>
		<p class="admin-alert admin-alert--error" th:if="${statusError}" th:text="${statusError}">更新に失敗しました。</p>

		<div class="admin-detail-grid">
			<section class="admin-card">
				<div class="admin-card-header">
					<div>
						<h2>内容</h2>
						<p>受信した情報を確認できます。</p>
					</div>
				</div>

				<dl class="admin-detail-list">
					<div>
						<dt>ID</dt>
						<dd th:text="${inquiry.id}">1</dd>
					</div>
					<div>
						<dt>受信日時</dt>
						<dd th:text="${#temporals.format(inquiry.createdAt, 'yyyy/MM/dd HH:mm')}">2026/03/18 10:00</dd>
					</div>
					<div>
						<dt>お名前</dt>
						<dd th:text="${inquiry.name}">石島 智司</dd>
					</div>
					<div>
						<dt>メールアドレス</dt>
						<dd th:text="${inquiry.email}">sample@example.com</dd>
					</div>
					<div>
						<dt>件名</dt>
						<dd th:text="${inquiry.subject}">件名</dd>
					</div>
				</dl>

				<section class="admin-message-box" th:text="${inquiry.message}">
					お問い合わせ本文
				</section>
			</section>

			<section class="admin-card">
				<div class="admin-card-header">
					<div>
						<h2>対応状況</h2>
						<p>現在の状態を変更できます。</p>
					</div>
				</div>

				<form class="admin-form" th:action="@{/admin/inquiries/{id}/status(id=${inquiry.id})}" th:object="${statusForm}" method="post">
					<label class="admin-field">
						<span>現在の対応状況</span>
						<select th:field="*{status}">
							<option value="NEW">未対応</option>
							<option value="IN_PROGRESS">対応中</option>
							<option value="COMPLETED">完了</option>
						</select>
					</label>
					<button class="admin-button" type="submit">更新する</button>
				</form>
			</section>
		</div>
	</div>
</body>
</html>
