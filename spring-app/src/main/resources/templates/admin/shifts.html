<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>シフト管理 | はむのくらし</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/admin.css}">
</head>
<body class="admin-body">
	<div class="admin-shell">
		<header class="admin-header">
			<div>
				<p class="admin-eyebrow">HAMU NO KURASHI</p>
				<h1>シフト管理</h1>
				<p class="admin-lead">本日シフトと月間シフト表を表示します。</p>
			</div>
			<form th:action="@{/admin/logout}" method="post">
				<button class="admin-button admin-button--ghost" type="submit">ログアウト</button>
			</form>
		</header>

		<div th:replace="~{admin/fragments :: adminNav(${adminSection})}"></div>

		<p class="admin-alert admin-alert--success" th:if="${shiftMessage}" th:text="${shiftMessage}">更新しました。</p>
		<p class="admin-alert admin-alert--error" th:if="${shiftError}" th:text="${shiftError}">エラーがありました。</p>

		<section class="admin-card">
			<div class="admin-card-header">
				<div>
					<h2 th:text="${#temporals.format(today, 'yyyy/MM/dd') + ' のシフト'}">本日のシフト</h2>
					<p>当日分のみ表示します。</p>
				</div>
				<div class="admin-header-actions">
					<a class="admin-link-button admin-button--ghost"
					   th:href="@{/admin/shifts/requests(year=${targetYear},month=${targetMonth})}">シフト希望</a>
				</div>
			</div>
			<div class="admin-table-wrap" th:if="${!#lists.isEmpty(todayShifts)}">
				<table class="admin-table">
					<thead>
						<tr>
							<th>従業員</th>
							<th>区分</th>
							<th>時間</th>
							<th>メモ</th>
							<th>操作</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="shift : ${todayShifts}">
							<td th:text="${shift.employeeName}">山田 太郎</td>
							<td th:text="${shift.shiftSlotLabel}">早番</td>
							<td th:text="${#temporals.format(shift.startTime, 'HH:mm') + ' - ' + #temporals.format(shift.endTime, 'HH:mm')}">10:00 - 21:00</td>
							<td th:text="${#strings.isEmpty(shift.note) ? '-' : shift.note}">-</td>
							<td>
								<a class="admin-link-button admin-button--ghost" th:href="@{/admin/shifts/{id}/edit(id=${shift.id})}">編集</a>
							</td>
						</tr>
					</tbody>
				</table>
			</div>
			<p th:if="${#lists.isEmpty(todayShifts)}">本日のシフトはまだ登録されていません。</p>
		</section>

		<section class="admin-card">
			<div class="admin-card-header">
				<div>
					<h2 th:text="${monthLabel + ' 月間シフト表'}">2026年4月 月間シフト表</h2>
					<p>1人1日複数シフトに対応しています。</p>
					<p class="admin-help-text" th:text="${'月間シフト件数: ' + monthShiftCount}">月間シフト件数: 0</p>
				</div>
				<div class="admin-header-actions">
					<a class="admin-link-button admin-button--ghost"
					   th:href="@{/admin/shifts(year=${prevYear},month=${prevMonth})}">前月</a>
					<a class="admin-link-button admin-button--ghost"
					   th:href="@{/admin/shifts(year=${nextYear},month=${nextMonth})}">次月</a>
					<form th:action="@{/admin/shifts/auto-generate}" method="post">
						<input type="hidden" name="year" th:value="${targetYear}">
						<input type="hidden" name="month" th:value="${targetMonth}">
						<button class="admin-button admin-button--ghost" type="submit">希望から自動作成</button>
					</form>
				</div>
			</div>
			<div class="admin-table-wrap">
				<table class="admin-table admin-shift-calendar-table">
					<thead>
						<tr>
							<th class="admin-shift-sticky-col">従業員</th>
							<th th:each="day : ${monthDays}"
							    th:classappend="${holidayMap[#temporals.format(day, 'yyyy-MM-dd')]} ? ' admin-day-holiday' : (${day.dayOfWeek.value == 6} ? ' admin-day-sat' : (${day.dayOfWeek.value == 7} ? ' admin-day-sun' : ' admin-day-weekday'))">
								<div class="admin-day-header">
									<span th:text="${day.dayOfMonth}">1</span>
									<small th:text="${#temporals.format(day, 'E')}">水</small>
								</div>
							</th>
						</tr>
					</thead>
					<tbody>
						<tr th:if="${#lists.isEmpty(shiftRows)}">
							<td class="admin-shift-empty" th:colspan="${#lists.size(monthDays) + 1}">表示できる従業員がいません。</td>
						</tr>
						<tr th:each="row : ${shiftRows}">
							<td class="admin-shift-sticky-col"
							    th:text="${row.employee.name + '（' + row.shiftCount + '件）'}">山田 太郎（12件）</td>
							<td th:each="cell : ${row.dayCells}" th:with="dayShifts=${cell.shifts}">
								<div class="admin-shift-cell"
								     th:if="${dayShifts != null and !#lists.isEmpty(dayShifts)}">
									<a class="admin-shift-pill"
									   th:each="shift : ${dayShifts}"
									   th:classappend="${shift.shiftSlot == 'EARLY'} ? ' admin-shift-pill--early' : (${shift.shiftSlot == 'LATE'} ? ' admin-shift-pill--late' : ' admin-shift-pill--full')"
									   th:href="@{/admin/shifts/{id}/edit(id=${shift.id})}"
									   th:title="${shift.shiftSlotLabel}"
									   th:text="${shift.shiftSlotShortLabel}">早</a>
								</div>
								<span class="admin-shift-empty-marker admin-shift-empty-marker--off"
								      th:if="${dayShifts == null or #lists.isEmpty(dayShifts)}">-</span>
							</td>
						</tr>
					</tbody>
				</table>
			</div>
		</section>
	</div>
</body>
</html>
