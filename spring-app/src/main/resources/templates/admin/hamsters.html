<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>ハムスター管理 | はむのくらし</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/admin.css}">
</head>
<body class="admin-body">
	<div class="admin-shell">
		<header class="admin-header">
			<div>
				<p class="admin-eyebrow">HAMU NO KURASHI</p>
				<h1>ハムスター管理</h1>
				<p class="admin-lead">店頭にいるハムスター情報を、一覧確認と編集画面への移動で管理できます。</p>
			</div>
			<div class="admin-header-actions"></div>
		</header>

		<div th:replace="~{admin/fragments :: adminNav(${adminSection})}"></div>

		<p class="admin-alert admin-alert--success"
		   th:if="${hamsterMessage}"
		   th:text="${hamsterMessage}">ハムスター情報を更新しました。</p>

		<section class="admin-summary-grid admin-summary-grid--compact">
			<article class="admin-summary-card">
				<h2>表示件数</h2>
				<p class="admin-summary-number" th:text="${hamsterCount}">0</p>
			</article>
			<article class="admin-summary-card">
				<h2>在籍中</h2>
				<p class="admin-summary-number" th:text="${availableCount}">0</p>
			</article>
			<article class="admin-summary-card">
				<h2>商談中</h2>
				<p class="admin-summary-number" th:text="${negotiatingCount}">0</p>
			</article>
			<article class="admin-summary-card">
				<h2>お迎え済み</h2>
				<p class="admin-summary-number" th:text="${adoptedCount}">0</p>
			</article>
		</section>

		<section class="admin-card">
			<div class="admin-card-header">
				<div>
					<h2>絞り込み</h2>
					<p>種類・性別・在籍状況で一覧を絞り込めます。</p>
				</div>
			</div>

			<form class="admin-filter-grid" th:action="@{/admin/hamsters}" method="get">
				<label class="admin-field">
					<span>種類</span>
					<select name="species">
						<option value="">すべて</option>
						<option th:each="speciesOption : ${speciesOptions}"
						        th:value="${speciesOption}"
						        th:selected="${speciesOption == selectedSpecies}"
						        th:text="${speciesOption}">ゴールデンハムスター</option>
					</select>
				</label>
				<label class="admin-field">
					<span>性別</span>
					<select name="sex">
						<option value="">すべて</option>
						<option th:each="sexOption : ${hamsterSexes}"
						        th:value="${sexOption.name()}"
						        th:selected="${sexOption == selectedSex}"
						        th:text="${sexOption.name() == 'MALE' ? 'オス' : 'メス'}">オス</option>
					</select>
				</label>
				<label class="admin-field">
					<span>在籍状況</span>
					<select name="status">
						<option value="">すべて</option>
						<option th:each="statusOption : ${hamsterStatuses}"
						        th:value="${statusOption.name()}"
						        th:selected="${statusOption == selectedStatus}"
						        th:text="${statusOption.name() == 'AVAILABLE' ? '在籍中' : (statusOption.name() == 'NEGOTIATING' ? '商談中' : 'お迎え済み')}">在籍中</option>
					</select>
				</label>
				<div class="admin-filter-actions">
					<button class="admin-button" type="submit">絞り込む</button>
					<a class="admin-link-button admin-button--ghost" th:href="@{/admin/hamsters}">リセット</a>
				</div>
			</form>
		</section>

		<section class="admin-card">
			<div class="admin-card-header">
				<div>
					<h2>ハムスター一覧</h2>
					<p>行を押すと編集画面へ移動します。</p>
				</div>
				<div class="admin-header-actions">
					<a class="admin-link-button admin-button--ghost" th:href="@{/admin/hamsters/analytics}">月別推移を見る</a>
					<a class="admin-link-button" th:if="${canCreateHamster}" th:href="@{/admin/hamsters/new}">新規ハムスターを登録</a>
				</div>
			</div>

			<div class="admin-table-wrap" th:if="${!#lists.isEmpty(hamsters)}">
				<table class="admin-table admin-table--hamsters" data-sortable="true">
					<thead>
						<tr>
							<th data-sort-type="number">ID</th>
							<th data-sort-type="text">種類</th>
							<th data-sort-type="text">性別</th>
							<th data-sort-type="date">生年月日</th>
							<th data-sort-type="date">入荷日</th>
							<th data-sort-type="text">在籍状況</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="hamster : ${hamsters}"
						    class="admin-table-row-link"
						    th:data-href="@{/admin/hamsters/{id}/edit(id=${hamster.id})}"
						    tabindex="0">
							<td th:text="${hamster.id}">1</td>
							<td th:text="${hamster.species != null && !hamster.species.isBlank() ? hamster.species : '-'}">ゴールデンハムスター</td>
							<td th:text="${hamster.sex != null ? (hamster.sex.name() == 'MALE' ? 'オス' : 'メス') : '-'}">オス</td>
							<td th:text="${hamster.birthDate != null ? #temporals.format(hamster.birthDate, 'yyyy/MM/dd') : '-'}">2026/03/20</td>
							<td th:text="${hamster.arrivalDate != null ? #temporals.format(hamster.arrivalDate, 'yyyy/MM/dd') : '-'}">2026/03/27</td>
							<td>
								<span class="admin-status"
								      th:classappend="${hamster.status != null && hamster.status.name() == 'AVAILABLE' ? ' admin-status--done' : (hamster.status != null && hamster.status.name() == 'NEGOTIATING' ? ' admin-status--progress' : ' admin-status--new')}"
								      th:text="${hamster.status != null ? (hamster.status.name() == 'AVAILABLE' ? '在籍中' : (hamster.status.name() == 'NEGOTIATING' ? '商談中' : 'お迎え済み')) : '-'}">在籍中</span>
							</td>
						</tr>
					</tbody>
				</table>
			</div>

			<p class="admin-empty" th:if="${#lists.isEmpty(hamsters)}">該当するハムスターはいません。</p>
		</section>
	</div>

	<script th:src="@{/admin.js}"></script>
</body>
</html>
