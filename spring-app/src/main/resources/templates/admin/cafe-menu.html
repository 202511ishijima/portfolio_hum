<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>カフェメニュー価格設定 | はむのくらし</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/admin.css}">
</head>
<body class="admin-body">
	<div class="admin-shell">
		<header class="admin-header">
			<div>
				<p class="admin-eyebrow">HAMU NO KURASHI</p>
				<h1>カフェメニュー価格設定</h1>
				<p class="admin-lead">価格を更新すると、フロントのカフェメニュー表示にも反映されます。</p>
			</div>
			<div class="admin-header-actions">
				<a class="admin-link-button admin-button--ghost" th:href="@{/admin/cafe/reception}">受付発行</a>
				<a class="admin-link-button admin-button--ghost" th:href="@{/admin/cafe/orders}">注文一覧へ</a>
			</div>
		</header>

		<div th:replace="~{admin/fragments :: adminNav(${adminSection})}"></div>

		<p class="admin-alert admin-alert--success" th:if="${cafeMessage}" th:text="${cafeMessage}">更新しました。</p>
		<p class="admin-alert admin-alert--error" th:if="${cafeError}" th:text="${cafeError}">更新に失敗しました。</p>

		<section class="admin-card">
			<div class="admin-card-header">
				<div>
					<h2>メニュー一覧</h2>
					<p>メニュー名・価格・提供状態を編集して、右上の一括更新で保存できます。</p>
				</div>
				<div class="admin-header-actions" th:if="${canManageCafe}">
					<button class="admin-button" type="submit" form="cafe-menu-bulk-form">一括更新</button>
				</div>
			</div>
			<div class="admin-table-wrap" th:if="${!#lists.isEmpty(menus)}">
				<form id="cafe-menu-bulk-form" th:action="@{/admin/cafe/menu/bulk-update}" method="post">
					<table class="admin-table">
						<thead>
							<tr>
								<th>ID</th>
								<th>区分</th>
								<th>メニュー名</th>
								<th>価格</th>
								<th>提供中</th>
								<th>最終更新</th>
							</tr>
						</thead>
						<tbody>
							<tr th:each="menu : ${menus}">
								<td th:text="${menu.id}">drink-01</td>
								<td th:text="${menu.category}">DRINK</td>
								<td>
									<input
										type="text"
										th:name="${'name_' + menu.id}"
										th:value="${menu.name}"
										th:disabled="${!canManageCafe}"
										required>
								</td>
								<td>
									<input
										type="number"
										min="0"
										th:name="${'price_' + menu.id}"
										th:value="${menu.price}"
										th:disabled="${!canManageCafe}"
										required>
								</td>
								<td>
									<label style="display:inline-flex;align-items:center;gap:4px;">
										<input
											type="checkbox"
											th:name="${'available_' + menu.id}"
											th:checked="${menu.available}"
											th:disabled="${!canManageCafe}">
										<span>提供中</span>
									</label>
								</td>
								<td th:text="${menu.updatedAt != null ? #temporals.format(menu.updatedAt, 'yyyy/MM/dd HH:mm') : '-'}">2026/03/30 12:30</td>
							</tr>
						</tbody>
					</table>
				</form>
			</div>
			<p th:if="${#lists.isEmpty(menus)}">メニューデータがありません。</p>
		</section>
	</div>
</body>
</html>
