<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>スタッフチャット | はむのくらし</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/admin.css}">
</head>
<body class="admin-body">
	<div class="admin-shell">
		<header class="admin-header">
			<div>
				<p class="admin-eyebrow">HAMU NO KURASHI</p>
				<h1>スタッフチャット</h1>
				<p class="admin-lead">全体連絡用の簡易チャットです。</p>
			</div>
			<div class="admin-header-actions">
				<a class="admin-link-button admin-button--ghost" th:href="@{/staff/shifts/mine}">自分のシフト</a>
				<form th:action="@{/admin/logout}" method="post">
					<button class="admin-button admin-button--ghost" type="submit">ログアウト</button>
				</form>
			</div>
		</header>

		<p class="admin-alert admin-alert--error" th:if="${chatError}" th:text="${chatError}">エラーがあります。</p>

		<section class="admin-card">
			<div class="admin-history-list" th:if="${!#lists.isEmpty(messages)}">
				<article class="admin-history-item" th:each="message : ${messages}">
					<p class="admin-help-text" th:text="${message.senderName + ' / ' + #temporals.format(message.sentAt, 'yyyy/MM/dd HH:mm')}">sender</p>
					<div class="admin-message-box" th:text="${message.body}">message</div>
				</article>
			</div>
			<p th:if="${#lists.isEmpty(messages)}">メッセージはまだありません。</p>
		</section>

		<section class="admin-card">
			<form class="admin-form" th:action="@{/staff/chat}" th:object="${chatForm}" method="post">
				<label class="admin-field">
					<span>メッセージ</span>
					<textarea class="admin-textarea" th:field="*{body}" rows="6" placeholder="連絡内容を入力してください"></textarea>
					<small class="admin-field-error" th:if="${#fields.hasErrors('body')}" th:errors="*{body}">Error</small>
				</label>
				<button class="admin-button" type="submit">送信する</button>
			</form>
		</section>
	</div>
</body>
</html>
