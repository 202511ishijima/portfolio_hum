<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>自分のシフト | はむのくらし</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/admin.css}">
</head>
<body class="admin-body">
	<div class="admin-shell">
		<header class="admin-header">
			<div>
				<p class="admin-eyebrow">HAMU NO KURASHI</p>
				<h1>自分のシフト</h1>
				<p class="admin-lead" th:text="${employee.name + ' さんの勤務予定'}">勤務予定</p>
			</div>
			<div class="admin-header-actions">
				<a class="admin-link-button admin-button--ghost" th:href="@{/staff/chat}">チャットへ</a>
				<form th:action="@{/admin/logout}" method="post">
					<button class="admin-button admin-button--ghost" type="submit">ログアウト</button>
				</form>
			</div>
		</header>

		<section class="admin-card">
			<div class="admin-table-wrap" th:if="${!#lists.isEmpty(shifts)}">
				<table class="admin-table">
					<thead>
						<tr>
							<th>勤務日</th>
							<th>開始</th>
							<th>終了</th>
							<th>メモ</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="shift : ${shifts}">
							<td th:text="${#temporals.format(shift.workDate, 'yyyy/MM/dd')}">2026/03/27</td>
							<td th:text="${#temporals.format(shift.startTime, 'HH:mm')}">09:00</td>
							<td th:text="${#temporals.format(shift.endTime, 'HH:mm')}">18:00</td>
							<td th:text="${shift.note}">通常勤務</td>
						</tr>
					</tbody>
				</table>
			</div>
			<p th:if="${#lists.isEmpty(shifts)}">現在登録されているシフトはありません。</p>
		</section>
	</div>
</body>
</html>
